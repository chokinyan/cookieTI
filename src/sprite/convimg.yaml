palettes:
  - name: global_palette
    max-entries: 48
    fixed-entries:
      - color : {index: 0, r: 255, g: 255, b: 255}
    images: automatic

converts:
  - name: perfectCookie
    palette: global_palette
    compress: zx0
    transparent-color-index: 0
    images:
      - ./images/perfectCookie.png

outputs:
  - type: c
    include-file: sprite.h
    palettes:
      - global_palette
    converts:
      - perfectCookie